<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>识别工作台 · 元件标识重构（静态草图）</title>
    <style>
      :root {
        --ink: #1e2936;
        --muted: #687585;
        --line: #dce3ea;
        --surface: #fff;
        --surface-alt: #f2f5f8;
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.12);
        --warn: #d97706;
        --shadow: 0 16px 45px rgba(26, 43, 61, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--surface-alt);
        font: 14px/1.5 system-ui, -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      }

      .wrap {
        width: min(1540px, calc(100vw - 24px));
        margin: 16px auto 40px;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 12px 22px;
        border-bottom: 1px solid rgba(96, 119, 144, 0.38);
        background: linear-gradient(180deg, rgba(33, 46, 63, 0.98), rgba(24, 35, 49, 0.96));
        box-shadow: 0 10px 30px rgba(16, 24, 40, 0.18);
      }

      .topbar h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #f5f8fc;
      }

      .topbar p {
        margin: 4px 0 0;
        color: rgba(212, 222, 232, 0.82);
        font-size: 12px;
        line-height: 1.6;
      }

      .chip-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .chip {
        padding: 7px 12px;
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(142, 164, 189, 0.26);
        border-radius: 999px;
        color: rgba(226, 234, 242, 0.84);
        background: rgba(255, 255, 255, 0.06);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
      }

      .chip.active {
        border-color: rgba(245, 249, 255, 0.3);
        color: #152130;
        background: #f2f6fb;
      }

      .screen {
        overflow: hidden;
        border: 1px solid rgba(216, 224, 232, 0.96);
        border-radius: 24px;
        background: rgba(248, 250, 252, 0.84);
        box-shadow: var(--shadow);
      }

      .screen-header {
        padding: 12px 18px 10px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(246, 248, 251, 0.92));
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .meta span {
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        color: #526b82;
        background: rgba(255, 255, 255, 0.96);
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
      }

      .canvas {
        padding: 12px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.74);
      }

      .panel-title {
        padding: 10px 12px 8px;
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
        border-bottom: 1px solid rgba(216, 224, 232, 0.72);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(249, 251, 253, 0.96));
      }

      .panel-title b {
        font-size: 13px;
        line-height: 1.2;
      }

      .label {
        color: #778a9d;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        line-height: 1;
        text-transform: uppercase;
      }

      .tab-bar {
        padding: 10px 12px 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        border-bottom: 1px solid rgba(216, 224, 232, 0.72);
        background: rgba(250, 252, 254, 0.72);
      }

      .tab {
        padding: 7px 12px;
        border: 1px solid rgba(210, 220, 232, 0.92);
        border-radius: 999px;
        background: #fff;
        color: #5f7286;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .tab.active {
        border-color: rgba(37, 99, 235, 0.5);
        color: #143a7a;
        background: rgba(37, 99, 235, 0.12);
      }

      .tab-content {
        padding: 12px;
        min-height: 520px;
      }

      .split {
        display: grid;
        grid-template-columns: minmax(0, 1.28fr) minmax(260px, 0.72fr);
        gap: 10px;
        align-items: start;
      }

      .preview-shell {
        border: 1px solid rgba(216, 224, 232, 0.9);
        border-radius: 16px;
        background: #fff;
        overflow: hidden;
      }

      .preview-toolbar {
        padding: 9px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(216, 224, 232, 0.72);
        background: rgba(248, 250, 252, 0.92);
        font-size: 12px;
        font-weight: 700;
        color: #526b82;
      }

      .mini-btn {
        height: 30px;
        padding: 0 10px;
        border: 1px solid rgba(210, 220, 232, 0.92);
        border-radius: 10px;
        background: #fff;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        color: #38506a;
      }

      .preview-canvas {
        min-height: 420px;
        background:
          radial-gradient(circle at 18% 14%, rgba(37, 99, 235, 0.12), transparent 45%),
          linear-gradient(90deg, rgba(90, 124, 160, 0.07) 1px, transparent 1px),
          linear-gradient(rgba(90, 124, 160, 0.07) 1px, transparent 1px),
          #fff;
        background-size: auto, 20px 20px, 20px 20px, auto;
        display: grid;
        place-items: center;
      }

      .preview-placeholder {
        width: min(520px, 92%);
        height: min(320px, 60vh);
        border: 1px solid rgba(216, 224, 232, 0.92);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.92);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 14px;
      }

      .preview-placeholder b {
        display: block;
        font-size: 13px;
      }

      .preview-placeholder p {
        margin: 8px 0 0;
        font-size: 12px;
        color: #6b7a8a;
      }

      .list-shell {
        border: 1px solid rgba(216, 224, 232, 0.9);
        border-radius: 16px;
        background: #fff;
        overflow: hidden;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .list-toolbar {
        padding: 9px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid rgba(216, 224, 232, 0.72);
        background: rgba(248, 250, 252, 0.92);
      }

      .list-toolbar strong {
        font-size: 12px;
        color: #2b3c55;
        letter-spacing: 0.02em;
      }

      .list-toolbar span {
        font-size: 11px;
        font-weight: 700;
        color: #6b7a8a;
      }

      .list {
        padding: 10px;
        overflow-y: auto;
        min-height: 0;
        max-height: clamp(360px, calc(100dvh - 420px), 640px);
        display: grid;
        gap: 8px;
      }

      .item {
        padding: 10px 11px;
        border: 1px solid rgba(216, 224, 232, 0.9);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.96);
      }

      .item-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .item-head b {
        font-size: 13px;
      }

      .badge {
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(37, 99, 235, 0.22);
        background: rgba(37, 99, 235, 0.08);
        color: #143a7a;
        font-size: 11px;
        font-weight: 800;
      }

      .item-meta {
        margin-top: 6px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px 10px;
        font-size: 11px;
        color: #6b7a8a;
      }

      .empty {
        padding: 14px;
        border: 1px dashed rgba(180, 35, 24, 0.22);
        border-radius: 14px;
        background: rgba(180, 35, 24, 0.04);
        color: #7a2c25;
        font-size: 12px;
      }

      .full {
        border: 1px solid rgba(216, 224, 232, 0.9);
        border-radius: 16px;
        background: #fff;
        padding: 12px;
      }

      .kv {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
        margin-top: 10px;
      }

      .kv th,
      .kv td {
        border-bottom: 1px solid rgba(230, 236, 242, 0.92);
        padding: 9px 10px;
        text-align: left;
        vertical-align: top;
      }

      .kv th {
        width: 220px;
        color: #5f7286;
        font-weight: 800;
      }

      .kv td {
        color: #1f2a3a;
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      @media (max-width: 980px) {
        .split {
          grid-template-columns: 1fr;
        }
        .list {
          max-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>识别工作台 · 元件标识重构（静态草图）</h1>
        <p>5 个页签：元件标识 / 组合 / 图纸标签表 / 控制-信号信息 / 图签信息。仅用于确认布局与滚动策略。</p>
      </div>
      <div class="chip-row" aria-label="页面导航占位">
        <a class="chip active" href="javascript:void(0)">识别工作台</a>
        <a class="chip" href="javascript:void(0)">知识库管理</a>
        <a class="chip" href="javascript:void(0)">图纸检索</a>
      </div>
    </header>

    <div class="wrap">
      <section class="screen">
        <div class="screen-header">
          <div class="meta">
            <span>结果 demo-result</span>
            <span>处理中</span>
            <span>预览 3 页</span>
          </div>
        </div>

        <div class="canvas">
          <section class="panel">
            <div class="panel-title">
              <b>图纸预览</b>
              <span class="label">workbench mock</span>
            </div>

            <div class="tab-bar" role="tablist" aria-label="工作台预览页签">
              <button class="tab active" type="button" data-tab="component-identification">元件标识</button>
              <button class="tab" type="button" data-tab="combinations">组合</button>
              <button class="tab" type="button" data-tab="tag-table">图纸标签表</button>
              <button class="tab" type="button" data-tab="control-signal">控制-信号信息</button>
              <button class="tab" type="button" data-tab="title-block">图签信息</button>
            </div>

            <div class="tab-content" id="tabContent"></div>
          </section>
        </div>
      </section>
    </div>

    <template id="tplComponentIdentification">
      <div class="split">
        <section class="preview-shell" aria-label="图纸标注预览">
          <div class="preview-toolbar">
            <span>第 <b id="pageIndex">1</b> 页 / 3</span>
            <div>
              <button class="mini-btn" type="button" id="prevPage">上一页</button>
              <button class="mini-btn" type="button" id="nextPage">下一页</button>
            </div>
          </div>
          <div class="preview-canvas">
            <div class="preview-placeholder">
              <div>
                <b>图纸标注预览（占位）</b>
                <p>这里复用 DrawingPreview：翻页 + 标注框。右侧为“元件标识列表”，列表内滚动。</p>
              </div>
            </div>
          </div>
        </section>

        <section class="list-shell" aria-label="元件标识列表">
          <div class="list-toolbar">
            <div>
              <strong>元件标识列表</strong>
              <span>（滚动仅在列表内部）</span>
            </div>
            <span>30 项</span>
          </div>
          <div class="list" id="componentList"></div>
        </section>
      </div>
    </template>

    <template id="tplFull">
      <div class="full">
        <b id="fullTitle"></b>
        <div class="empty" id="fullEmpty" style="margin-top: 10px"></div>
        <table class="kv" id="kvTable" style="display:none"></table>
      </div>
    </template>

    <script>
      const state = {
        tab: "component-identification",
        page: 1,
      };

      const sampleTitleFields = {
        客户名称: "某某客户",
        工程名称: "风机控制改造",
        图号: "A17387_1706",
        图名: "风机控制图",
        版本: "B",
        日期: "2026-06-25",
      };

      function buildComponentList(root) {
        const container = root.querySelector("#componentList");
        if (!container) return;
        const rows = Array.from({ length: 30 }, (_, idx) => ({
          name: `元件-${idx + 1}`,
          code: idx % 4 === 0 ? `KM${Math.floor(idx / 4) + 1}` : `FU${idx + 1}`,
          type: idx % 3 === 0 ? "relay" : idx % 3 === 1 ? "fuse" : "terminal",
          page: (idx % 3) + 1,
          conf: `${88 + (idx % 10)}%`,
        }));

        container.innerHTML = rows
          .map(
            (r) => `
              <article class="item">
                <div class="item-head">
                  <b>${r.name}</b>
                  <span class="badge">${r.code}</span>
                </div>
                <div class="item-meta">
                  <div>类型：${r.type}</div>
                  <div>页码：第 ${r.page} 页</div>
                  <div>置信度：${r.conf}</div>
                  <div>来源：识别</div>
                </div>
              </article>
            `,
          )
          .join("");
      }

      function renderFull(root, title, emptyText, kv) {
        const titleEl = root.querySelector("#fullTitle");
        const emptyEl = root.querySelector("#fullEmpty");
        const tableEl = root.querySelector("#kvTable");
        if (titleEl) titleEl.textContent = title;

        if (kv && Object.keys(kv).length) {
          if (emptyEl) emptyEl.style.display = "none";
          if (tableEl) {
            tableEl.style.display = "table";
            const rows = Object.entries(kv)
              .map(([k, v]) => `<tr><th>${k}</th><td>${String(v ?? "--")}</td></tr>`)
              .join("");
            tableEl.innerHTML = `<tbody>${rows}</tbody>`;
          }
          return;
        }

        if (tableEl) tableEl.style.display = "none";
        if (emptyEl) {
          emptyEl.style.display = "block";
          emptyEl.textContent = emptyText;
        }
      }

      function render() {
        const host = document.getElementById("tabContent");
        if (!host) return;
        host.innerHTML = "";

        if (state.tab === "component-identification") {
          const tpl = document.getElementById("tplComponentIdentification");
          const node = tpl.content.cloneNode(true);
          host.appendChild(node);

          const root = host;
          buildComponentList(root);

          const pageIndex = root.querySelector("#pageIndex");
          const prev = root.querySelector("#prevPage");
          const next = root.querySelector("#nextPage");

          function syncPage() {
            if (pageIndex) pageIndex.textContent = String(state.page);
          }

          if (prev) {
            prev.addEventListener("click", () => {
              state.page = Math.max(1, state.page - 1);
              syncPage();
            });
          }
          if (next) {
            next.addEventListener("click", () => {
              state.page = Math.min(3, state.page + 1);
              syncPage();
            });
          }
          syncPage();
          return;
        }

        const tpl = document.getElementById("tplFull");
        const node = tpl.content.cloneNode(true);
        host.appendChild(node);

        const root = host;
        if (state.tab === "combinations") {
          renderFull(root, "组合", "该页签为全宽内容区，不显示右侧元件标识列表。", null);
        } else if (state.tab === "tag-table") {
          renderFull(root, "图纸标签表", "该页签为全宽内容区，不显示右侧元件标识列表。", null);
        } else if (state.tab === "control-signal") {
          renderFull(root, "控制-信号信息", "该页签为全宽内容区，不显示右侧元件标识列表。", null);
        } else if (state.tab === "title-block") {
          renderFull(
            root,
            "图签信息（fields key/value）",
            "当 title_block.fields 为空时显示空态，并可回退为 title_block 顶层 key/value。",
            sampleTitleFields,
          );
        }
      }

      function setTab(next) {
        state.tab = next;
        document.querySelectorAll(".tab").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.tab === next);
        });
        render();
      }

      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => setTab(btn.dataset.tab));
      });

      render();
    </script>
  </body>
</html>
