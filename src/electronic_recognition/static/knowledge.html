<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>知识库管理</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260623-2" />
    <link rel="stylesheet" href="/static/knowledge.css?v=20260623-2" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p>Knowledge Console</p>
        <h1>知识库管理</h1>
      </div>
      <div class="header-actions">
        <a class="knowledge-entry" href="/">识别工作台</a>
        <a class="knowledge-entry" href="/search">图纸检索</a>
        <button class="knowledge-entry header-button" id="refreshButton" type="button">刷新</button>
        <div class="status" id="dataStatus">
          <span></span><b>数据读取中</b>
        </div>
      </div>
    </header>

    <main class="knowledge-shell">
      <section class="stats-grid" id="statsGrid">
        <article><span>单元件总数</span><strong id="componentTotal">0</strong></article>
        <article><span>组合元件总数</span><strong id="ruleTotal">0</strong></article>
        <article><span>已启用组合</span><strong id="enabledRuleTotal">0</strong></article>
        <article><span>数据更新时间</span><strong id="updatedAt">--</strong></article>
      </section>

      <section class="knowledge-layout">
        <aside class="management-sidebar">
          <div class="sidebar-toolbar">
            <div class="kind-switch" role="tablist" aria-label="知识库类型">
              <button class="kind-tab active" data-kind="component" type="button">单元件</button>
              <button class="kind-tab" data-kind="rule" type="button">组合元件</button>
            </div>
            <button class="primary-button" id="createButton" type="button">新建</button>
          </div>

          <div class="filter-card">
            <label>
              <span>搜索</span>
              <input id="searchInput" type="search" placeholder="按名称、ID、类型筛选" />
            </label>
            <label>
              <span>附加筛选</span>
              <select id="secondaryFilter">
                <option value="">全部</option>
              </select>
            </label>
          </div>

          <div class="list-panel" id="listPanel"></div>
        </aside>

        <section class="editor-panel">
          <div class="editor-header">
            <div>
              <p id="editorEyebrow">MANAGEMENT</p>
              <h2 id="editorTitle">选择左侧记录查看详情</h2>
            </div>
            <div class="editor-actions">
              <button class="ghost-button" id="validateButton" type="button">校验</button>
              <button class="ghost-button" id="testButton" type="button">试运行</button>
              <button class="danger-button" id="deleteButton" type="button">删除</button>
              <button class="primary-button" id="saveButton" type="button">保存</button>
            </div>
          </div>

          <p class="feedback hidden" id="feedbackMessage" role="alert"></p>

          <div class="editor-body" id="editorBody">
            <div class="empty-editor">
              <h3>从左侧选择记录</h3>
              <p>你可以在这里新增、编辑单元件与组合元件，并把组合元件成员手动编排成可参与识别的规则。</p>
            </div>
          </div>
        </section>
      </section>
    </main>

    <template id="componentEditorTemplate">
      <form class="editor-form" data-form="component">
        <section class="form-section">
          <div class="section-heading">
            <p>BASIC</p>
            <h3>单元件信息</h3>
          </div>
          <div class="field-grid">
            <label><span>ID</span><input name="id" required /></label>
            <label><span>名称</span><input name="label" required /></label>
            <label><span>元件类型</span><input name="component_type" /></label>
            <label><span>型号</span><input name="model" /></label>
            <label class="full"><span>定义</span><textarea name="definition" rows="3"></textarea></label>
            <label><span>标准</span><input name="standards" placeholder="逗号分隔" /></label>
            <label><span>别名</span><input name="aliases" placeholder="逗号分隔" /></label>
            <label><span>来源</span><input name="source" /></label>
            <label class="full"><span>备注</span><textarea name="notes" rows="3"></textarea></label>
          </div>
          <label class="toggle-field"><input type="checkbox" name="enabled" checked />启用该单元件</label>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p>IMAGES</p>
            <h3>图片维护</h3>
          </div>
          <div class="image-actions">
            <label class="upload-box">
              <span>上传主图</span>
              <input type="file" name="primaryImage" accept="image/png,image/jpeg,image/webp" />
            </label>
            <label class="upload-box">
              <span>新增变体图</span>
              <input type="file" name="variantImage" accept="image/png,image/jpeg,image/webp" />
            </label>
          </div>
          <div class="image-preview-grid" data-image-preview></div>
        </section>
      </form>
    </template>

    <template id="ruleEditorTemplate">
      <form class="editor-form" data-form="rule">
        <section class="form-section">
          <div class="section-heading">
            <p>BASIC</p>
            <h3>组合元件信息</h3>
          </div>
          <div class="field-grid">
            <label><span>ID</span><input name="id" required /></label>
            <label><span>名称</span><input name="name" required /></label>
            <label><span>作用域</span>
              <select name="scope">
                <option value="same_page">same_page</option>
                <option value="document">document</option>
              </select>
            </label>
            <label><span>默认置信度</span><input name="confidence" type="number" min="0" max="1" step="0.01" /></label>
            <label><span>来源</span><input name="source" /></label>
            <label class="full"><span>描述</span><textarea name="description" rows="3"></textarea></label>
            <label><span>别名</span><input name="aliases" placeholder="逗号分隔" /></label>
            <label class="full"><span>备注</span><textarea name="notes" rows="3"></textarea></label>
          </div>
          <label class="toggle-field"><input type="checkbox" name="enabled" checked />启用该组合元件</label>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p>MEMBERS</p>
            <h3>成员编排</h3>
          </div>
          <div class="member-toolbar">
            <button class="ghost-button" data-action="add-member" type="button">添加成员</button>
          </div>
          <div class="member-list" data-member-list></div>
        </section>

        <section class="form-section">
          <div class="section-heading">
            <p>TEST</p>
            <h3>试运行输入</h3>
          </div>
          <label class="full-width">
            <span>识别结果 JSON（可选）</span>
            <textarea name="test_payload" rows="8" placeholder='{"detected_components":[...]}'></textarea>
          </label>
          <label class="upload-box compact">
            <span>上传预览图</span>
            <input type="file" name="ruleImage" accept="image/png,image/jpeg,image/webp" />
          </label>
          <div class="image-preview-grid" data-rule-image-preview></div>
        </section>
      </form>
    </template>

    <template id="memberRowTemplate">
      <article class="member-card">
        <div class="member-card-header">
          <strong>成员</strong>
          <button class="danger-button subtle" data-action="remove-member" type="button">删除</button>
        </div>
        <div class="field-grid">
          <label><span>角色</span><input name="role" /></label>
          <label><span>最小数量</span><input name="min_quantity" type="number" min="1" value="1" /></label>
          <label class="full">
            <span>单元件选择</span>
            <select name="component_ids" multiple></select>
          </label>
          <label><span>代号正则</span><input name="code_patterns" placeholder="逗号分隔" /></label>
          <label><span>名称关键词</span><input name="label_keywords" placeholder="逗号分隔" /></label>
        </div>
      </article>
    </template>

    <script src="/static/knowledge.js?v=20260623-2" defer></script>
  </body>
</html>
